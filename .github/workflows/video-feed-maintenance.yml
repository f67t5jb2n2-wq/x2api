name: Video Feed Maintenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      shard_index:
        description: '指定同步分片编号 0..N-1；留空表示运行全部分片'
        required: false
        default: ''
      tag_limit:
        description: '单次打标签扫描条数'
        required: false
        default: '200'
      apply_cleanup:
        description: '是否执行清理: true / false'
        required: false
        default: 'true'
      high_score_threshold:
        description: '高分视频保留阈值'
        required: false
        default: '20'
      event_days:
        description: 'feed_events 明细保留天数'
        required: false
        default: '90'
      video_days:
        description: '普通视频保留天数'
        required: false
        default: '45'
      public_video_days:
        description: '公共池视频保留天数'
        required: false
        default: '75'
      high_score_video_days:
        description: '高分视频保留天数'
        required: false
        default: '120'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.matrix.outputs.shard_matrix }}
      shard_count: ${{ steps.matrix.outputs.shard_count }}

    steps:
      - name: Build shard matrix
        id: matrix
        env:
          INPUT_SHARD_INDEX: ${{ inputs.shard_index || '' }}
          INPUT_SHARD_COUNT: ${{ vars.OPENSEARCH_SYNC_SHARD_COUNT || '1' }}
        run: |
          python - <<'PY'
          import json
          import os

          raw_index = (os.environ.get("INPUT_SHARD_INDEX") or "").strip().lower()
          raw_count = (os.environ.get("INPUT_SHARD_COUNT") or "1").strip()
          try:
              shard_count = int(raw_count)
          except ValueError:
              shard_count = 1

          if shard_count <= 0:
              shard_count = 1

          if raw_index == "":
              shards = list(range(shard_count))
          else:
              try:
                  shard_index = int(raw_index)
              except ValueError as exc:
                  raise ValueError("shard_index must be blank or an integer.") from exc

              if shard_index < 0 or shard_index >= shard_count:
                  raise ValueError("shard_index must be between 0 and shard_count - 1.")

              shards = [shard_index]

          matrix = {"shard": shards}
          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
              fh.write(f"shard_count={shard_count}\n")
          PY

  maintain:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}
    concurrency:
      group: ${{ github.workflow }}-shard-${{ matrix.shard }}-of-${{ needs.prepare.outputs.shard_count }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt

      - name: Update user feed profiles
        timeout-minutes: 5
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          DB_LOCK_MAX_WRITERS: "1"
        run: |
          python scripts/update_user_feed_profiles.py --lookback-days 90

      - name: Seed system video targets
        timeout-minutes: 5
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
        run: |
          python collector/twitter_monitor.py seed-system-targets

      - name: Cleanup video feed data
        if: inputs.apply_cleanup != 'false'
        timeout-minutes: 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          HIGH_SCORE_THRESHOLD: ${{ inputs.high_score_threshold || '20' }}
          EVENT_DAYS: ${{ inputs.event_days || vars.VIDEO_FEED_EVENT_DAYS || '90' }}
          VIDEO_DAYS: ${{ inputs.video_days || vars.VIDEO_FEED_VIDEO_DAYS || '45' }}
          PUBLIC_VIDEO_DAYS: ${{ inputs.public_video_days || vars.VIDEO_FEED_PUBLIC_VIDEO_DAYS || '75' }}
          HIGH_SCORE_VIDEO_DAYS: ${{ inputs.high_score_video_days || vars.VIDEO_FEED_HIGH_SCORE_VIDEO_DAYS || '120' }}
        run: |
          if [ "${EVENT_DAYS}" -lt 90 ]; then
            EVENT_DAYS=90
          fi
          python scripts/cleanup_video_feed_data.py \
            --apply \
            --event-days "${EVENT_DAYS}" \
            --video-days "${VIDEO_DAYS}" \
            --public-video-days "${PUBLIC_VIDEO_DAYS}" \
            --high-score-video-days "${HIGH_SCORE_VIDEO_DAYS}" \
            --high-score-threshold "${HIGH_SCORE_THRESHOLD}"
