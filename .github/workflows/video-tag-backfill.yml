name: Video Tag Backfill

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      tag_limit:
        description: '单次打标签扫描条数'
        required: false
        default: '200'

jobs:
  backfill-video-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt

      - name: Backfill video tags
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          TAG_LIMIT: ${{ inputs.tag_limit || '200' }}
        run: |
          python scripts/backfill_video_tags.py --apply --limit "${TAG_LIMIT}"
